name: Update Library

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download and decode library
        run: |
          curl -L https://raw.githubusercontent.com/tsuramatsu1/pfs-library/main/public/library.json -o library.json
          node decode.js

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add decoded-library.json
          git diff --staged --quiet || git commit -m "Update decoded library"
          git push
