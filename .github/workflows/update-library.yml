name: Update Library

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download library.json
        run: |
          curl -L https://raw.githubusercontent.com/tsuramatsu1/pfs-library/main/public/library.json -o library.json

      - name: Run decoder
        run: |
          node decode.cjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add decoded-library.json

          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update decoded library"
            git push
          fi
